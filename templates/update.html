<html lang="en">
<head>
     <meta charset="UTF-8">
{#    <meta name="viewport" content="width=device-width, initial-scale=1.0">#}
    <title>Update</title>
    <!-- Javascript-Library for for example Ajax -->
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
     <style>
        body {
            font-family: Arial, sans-serif;
            margin: 100px;
        }

        a {
            margin-bottom: 10px;
            display: block;
        }

        form {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 30%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <a href="{% url 'incoming_goods' %}">Back</a>

    <form method="post" action="{% url 'update' entry.id %}">
        {% csrf_token %}
         <div>
            <label for="ean">EAN:</label>
            <input type="number" id="ean" name="ean" value="{{ entry.product.gtin }}" readonly>
        </div>
        <div>
            <label for="product_name">Name:</label>
            <input type="text" id="product_name" name="product_name" value="{{ entry.product.name }}" readonly>
        </div>
        <div>
            <label for="product_number">Number:</label>
            <input type="text" id="product_number" name="product_number" value="{{ entry.product.number }}" readonly>
        </div>
        <div>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" value="{{ entry.quantity }}" required min="0">
        </div>
        <div>
            <label for="warehouse">Warehouse:</label>
            <input type="number" id="warehouse" name="warehouse" value="{{ entry.warehouse }}" readonly>
        </div>
        <button type="submit">Modify</button>
    </form>
</body>
</html>
